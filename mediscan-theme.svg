<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F4FBFF"/>
      <stop offset="1" stop-color="#E8FFF2"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F6FAFF"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0EA5E9"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#0F172A" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <circle cx="170" cy="170" r="120" fill="#DBF4FF"/>
  <circle cx="1480" cy="760" r="170" fill="#D9FBE8"/>
  <circle cx="1500" cy="130" r="90" fill="#EAF2FF"/>

  <text x="120" y="110" font-size="52" font-family="Segoe UI, Arial, sans-serif" font-weight="800" fill="#0F172A">MediScan AI</text>
  <text x="120" y="152" font-size="24" font-family="Segoe UI, Arial, sans-serif" fill="#334155">Smart Medical Report Analysis with Human-Centered Care</text>

  <rect x="110" y="210" width="1380" height="620" rx="28" fill="url(#card)" stroke="#D6E5F5" stroke-width="2" filter="url(#shadow)"/>

  <g>
    <rect x="160" y="270" width="240" height="120" rx="18" fill="#EFF6FF" stroke="#93C5FD"/>
    <text x="190" y="320" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#1E3A8A">1. Login</text>
    <text x="190" y="355" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#334155">Secure patient access</text>
  </g>

  <g>
    <rect x="480" y="270" width="280" height="120" rx="18" fill="#ECFEFF" stroke="#67E8F9"/>
    <text x="510" y="320" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#155E75">2. Upload Report</text>
    <text x="510" y="355" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#334155">Auto-extract key values</text>
  </g>

  <g>
    <rect x="840" y="270" width="300" height="120" rx="18" fill="#F0FDF4" stroke="#86EFAC"/>
    <text x="870" y="320" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#166534">3. Analyze Tests</text>
    <text x="870" y="355" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#334155">Diabetes • LFT • KFT • Thyroid • CBC</text>
  </g>

  <g>
    <rect x="1210" y="270" width="220" height="120" rx="18" fill="#FFF7ED" stroke="#FDBA74"/>
    <text x="1240" y="320" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#9A3412">4. Risk Level</text>
    <text x="1240" y="355" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#334155">Clinical guidance</text>
  </g>

  <g stroke="url(#accent)" stroke-width="6" stroke-linecap="round">
    <line x1="400" y1="330" x2="470" y2="330"/>
    <line x1="760" y1="330" x2="830" y2="330"/>
    <line x1="1140" y1="330" x2="1200" y2="330"/>
  </g>

  <g>
    <rect x="180" y="470" width="430" height="290" rx="24" fill="#FFFFFF" stroke="#D1FAE5" stroke-width="2" filter="url(#shadow)"/>
    <text x="210" y="525" font-size="32" font-family="Segoe UI, Arial, sans-serif" font-weight="800" fill="#065F46">AI Care Chatbot</text>
    <text x="210" y="565" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#334155">Explains conditions in human language</text>
    <text x="210" y="600" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#334155">Example: Anemia support and Q&amp;A</text>
    <rect x="210" y="635" width="360" height="80" rx="14" fill="#ECFDF5"/>
    <text x="235" y="680" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#166534">"I am here to help, step by step."</text>
  </g>

  <g>
    <rect x="660" y="470" width="360" height="290" rx="24" fill="#FFFFFF" stroke="#DBEAFE" stroke-width="2" filter="url(#shadow)"/>
    <text x="690" y="525" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="800" fill="#1D4ED8">Nearby Doctors</text>
    <text x="690" y="565" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#334155">Recommends doctors if urgent care is needed</text>
    <circle cx="740" cy="655" r="36" fill="#BFDBFE"/>
    <rect x="800" y="625" width="170" height="58" rx="12" fill="#EFF6FF"/>
    <text x="818" y="660" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#1E3A8A">Dr. Sharma</text>
    <text x="800" y="705" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#475569">2.3 km • Internal Medicine</text>
  </g>

  <g>
    <rect x="1060" y="470" width="390" height="290" rx="24" fill="#FFFFFF" stroke="#FECACA" stroke-width="2" filter="url(#shadow)"/>
    <text x="1090" y="525" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="800" fill="#B91C1C">Blood Bank + NGO</text>
    <text x="1090" y="565" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#334155">Consent-based blood group support</text>
    <text x="1090" y="598" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#334155">Find nearby donors and life-saving centers</text>
    <path d="M1148 700C1148 660 1200 640 1200 596C1200 642 1252 660 1252 700C1252 729 1229 752 1200 752C1171 752 1148 729 1148 700Z" fill="#FCA5A5"/>
    <text x="1278" y="710" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#7F1D1D">A+</text>
  </g>

  <text x="120" y="865" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#334155">Theme: Early detection, compassionate AI guidance, and community impact.</text>
</svg>
